---
# Pod identity for mcp-server. IRSA annotation lets the pod assume the
# IAM role created by terraform/modules/iam (irsa.tf); the role-arn
# string gets substituted by helm or sed at apply time.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-server
  namespace: openproject-mcp
  labels:
    app: openproject-mcp
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::__ACCOUNT_ID__:role/openproject-mcp-server
automountServiceAccountToken: true
---
# Client identity. The SA Istio AuthorizationPolicy expects on /sse and
# /messages/. Anything calling MCP from inside the cluster runs as this SA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-client
  namespace: openproject-mcp
  labels:
    app: openproject-mcp
    role: client
