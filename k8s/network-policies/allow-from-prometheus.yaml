---
# Allow Prometheus to scrape /metrics on mcp-server pods.
# kube-prometheus-stack runs Prometheus in `monitoring`.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-prometheus
  namespace: openproject-mcp
  labels:
    app: openproject-mcp
spec:
  podSelector:
    matchLabels:
      app: openproject-mcp
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8000   # mcp-server /metrics path is on app port
        - protocol: TCP
          port: 15020  # istio-proxy merged stats (envoy + app)
