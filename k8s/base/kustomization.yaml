apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# plain kustomize manifests for consumers that don't render the helm chart.
# helm chart at helm/openproject-mcp/ is the preferred deploy path.

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/part-of: openproject-mcp
      app.kubernetes.io/managed-by: kustomize

resources:
  - serviceaccount.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml

images:
  - name: gsst3ja/openproject-mcp
    newTag: latest
