---
# Placeholder networking play. VPC / routes / SG live in terraform;
# this is for host-level nudges (mtu, dns, iptables) after provision.

- name: host-level networking tweaks
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: ensure systemd-resolved is enabled
      ansible.builtin.service:
        name: systemd-resolved
        enabled: true
        state: started

    - name: drop in /etc/resolv.conf shim if missing
      ansible.builtin.file:
        src: /run/systemd/resolve/resolv.conf
        dest: /etc/resolv.conf
        state: link
        force: true
