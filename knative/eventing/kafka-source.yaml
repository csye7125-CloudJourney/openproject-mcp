# Reads openproject.events.raw from MSK and emits each kafka record
# as a CloudEvent into the in-cluster broker. ce-type
# "openproject.event.raw" is what downstream triggers filter on.
#
# Bootstrap is env-driven. Dev points at a local kafka; prod uses MSK
# SASL/SCRAM on 9096 (the SCRAM listener). 9098 is the IAM listener
# but KafkaSource can't speak IAM yet, hence SCRAM here.
apiVersion: sources.knative.dev/v1beta1
kind: KafkaSource
metadata:
  name: openproject-events-raw
  namespace: openproject-mcp
  labels:
    app: openproject-mcp
    component: knative-eventing
spec:
  consumerGroup: knative-mcp-events
  # MSK_BOOTSTRAP is replaced at apply time via envsubst or helm/kustomize:
  #   export MSK_BOOTSTRAP=$(terraform output -raw msk_bootstrap_brokers_sasl_scram)
  #   envsubst < kafka-source.yaml | kubectl apply -f -
  bootstrapServers:
    - "${MSK_BOOTSTRAP}"
  topics:
    - openproject.events.raw
  net:
    sasl:
      enable: true
      user:
        secretKeyRef:
          name: msk-scram
          key: username
      password:
        secretKeyRef:
          name: msk-scram
          key: password
      type:
        secretKeyRef:
          name: msk-scram
          key: saslType  # value: SCRAM-SHA-512
    tls:
      enable: true
  initialOffset: latest
  ordering: ordered
  sink:
    ref:
      apiVersion: eventing.knative.dev/v1
      kind: Broker
      name: default
      namespace: openproject-mcp
