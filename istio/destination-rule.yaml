---
# DestinationRule for the MCP service. Two subsets for canarying v2
# beside stable v1. ISTIO_MUTUAL pairs with PeerAuthentication STRICT;
# without it the sidecar would attempt plaintext and get refused.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: openproject-mcp
  namespace: openproject-mcp
spec:
  host: openproject-mcp.openproject-mcp.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
---
# OpenProject upstream. SIMPLE TLS because it's an external service
# (no spiffe identity, so ISTIO_MUTUAL would fail the handshake).
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: openproject-upstream
  namespace: openproject-mcp
spec:
  host: openproject.openproject-mcp.svc.cluster.local
  trafficPolicy:
    tls:
      mode: SIMPLE
