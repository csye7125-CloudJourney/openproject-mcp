apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openproject-mcp-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: openproject-mcp
    environment: staging
  annotations:
    # staging only takes stable semver, no rc/beta
    argocd-image-updater.argoproj.io/image-list: mcp=gsst3ja/openproject-mcp
    argocd-image-updater.argoproj.io/mcp.update-strategy: semver
    argocd-image-updater.argoproj.io/mcp.allow-tags: regexp:^v?[0-9]+\.[0-9]+\.[0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/write-back-target: kustomization:manifests/openproject-mcp/overlays/staging
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: openproject-mcp
  source:
    repoURL: git@github.com:csye7125-CloudJourney/openproject-mcp-manifests.git
    targetRevision: main
    path: manifests/openproject-mcp/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: openproject-mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
