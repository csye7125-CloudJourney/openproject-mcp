apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openproject-mcp-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/name: openproject-mcp
    environment: prod
  annotations:
    # prod is report-only. image-updater watches; no auto write-back.
    argocd-image-updater.argoproj.io/image-list: mcp=gsst3ja/openproject-mcp
    argocd-image-updater.argoproj.io/mcp.update-strategy: name
    argocd-image-updater.argoproj.io/mcp.allow-tags: regexp:^v?[0-9]+\.[0-9]+\.[0-9]+$
spec:
  project: openproject-mcp
  source:
    repoURL: git@github.com:csye7125-CloudJourney/openproject-mcp-manifests.git
    targetRevision: main
    path: manifests/openproject-mcp/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: openproject-mcp
  # prod uses selfHeal but skips automated prune. accidental manifest
  # deletes should page the operator, not vanish silently.
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 10m
  revisionHistoryLimit: 20
