---
# argocd-image-updater watches Docker Hub for new tags and writes new
# image refs back to the manifests repo. Runs as its own deployment in
# the argocd namespace.
#
# Install:
#   kubectl apply -n argocd \
#     -f https://raw.githubusercontent.com/argoproj-labs/argocd-image-updater/stable/manifests/install.yaml
#
# Per-Application annotations (image-list, update-strategy, allow-tags,
# write-back-target) live on each Application; see
# applications/openproject-mcp-{dev,staging,prod}.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-image-updater
data:
  # Map a name (used in image-list annotations on Applications) to a registry.
  registries.conf: |
    registries:
      - name: Docker Hub
        api_url: https://registry-1.docker.io
        prefix: docker.io
        ping: yes
        credentials: pullsecret:argocd/dockerhub-pull-secret
        defaultns: library
  # Log level. info is fine; bump to debug when chasing write-back issues.
  log.level: info
  # Polling interval against the registry. Default 2m; 5m is plenty
  # for our cadence and eases docker hub rate-limit pressure.
  argocd.update-interval: 5m
  # Git creds for write-back come from the `git-creds` Secret in the argocd
  # namespace (see repositories/manifests-repo.yaml).
  git.user: argocd-image-updater
  git.email: argocd-image-updater@t3ja.com
