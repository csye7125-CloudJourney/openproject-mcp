{{- /*
Extra config the jaeger chart doesn't template natively: sampling strategies
plus an ES index template hint for trace pruning. Mounted by the collector
via extraConfigmapMounts in values-prod.yaml.
*/ -}}
{{- if .Values.jaeger.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-sampling-strategies
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/component: jaeger
    app.kubernetes.io/part-of: observability
data:
  strategies.json: |
    {
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.1
      },
      "service_strategies": [
        {
          "service": "openproject-mcp",
          "type": "probabilistic",
          "param": 0.5,
          "operation_strategies": [
            {
              "operation": "POST /webhooks/openproject",
              "type": "probabilistic",
              "param": 1.0
            },
            {
              "operation": "GET /healthz",
              "type": "probabilistic",
              "param": 0.0
            },
            {
              "operation": "GET /readyz",
              "type": "probabilistic",
              "param": 0.0
            }
          ]
        }
      ]
    }
{{- end }}
