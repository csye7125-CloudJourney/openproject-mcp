# defaults for the observability wrapper chart.
# per-env tuning in values-prod.yaml.

# install with --namespace observability
namespace: observability

kube-prometheus-stack:
  enabled: true
  # grafana lives inside this release so prom + alertmanager + grafana
  # share one secret store + sidecar config. ingress / oauth stuff is
  # values-prod.yaml.
  prometheus:
    prometheusSpec:
      retention: 15d
      retentionSize: 45GiB
      resources:
        requests:
          cpu: 500m
          memory: 2Gi
        limits:
          cpu: 2000m
          memory: 8Gi
      # Cross-namespace scraping. Default kube-prometheus-stack pins the
      # Prometheus CR's monitor selectors to the release label, which
      # hides ServiceMonitors that live in app namespaces. Flipping the
      # *SelectorNilUsesHelmValues knobs to false makes an empty selector
      # mean "match everything"; pair them with explicit empty
      # selector+namespaceSelector so any SM/PodMonitor/PrometheusRule
      # in any namespace gets scraped without a post-install kubectl patch.
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector: {}
      podMonitorSelectorNilUsesHelmValues: false
      podMonitorSelector: {}
      podMonitorNamespaceSelector: {}
      ruleSelectorNilUsesHelmValues: false
      ruleSelector: {}
      ruleNamespaceSelector: {}
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
  alertmanager:
    alertmanagerSpec:
      replicas: 2
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi
  grafana:
    enabled: true
    defaultDashboardsEnabled: true
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL
      datasources:
        enabled: true
    persistence:
      enabled: true
      storageClassName: gp3
      size: 10Gi
    adminPassword: ""  # overridden via ExternalSecret in values-prod
  nodeExporter:
    enabled: true
  kubeStateMetrics:
    enabled: true

elasticsearch:
  enabled: true
  # three-node ES backing kibana + jaeger spans. 30Gi gp3 per pod.
  # dev keeps everything in one AZ; prod spreads via
  # topologySpreadConstraints in values-prod.yaml.
  replicas: 3
  minimumMasterNodes: 2
  esJavaOpts: "-Xmx2g -Xms2g"
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  volumeClaimTemplate:
    accessModes: ["ReadWriteOnce"]
    storageClassName: gp3
    resources:
      requests:
        storage: 30Gi
  antiAffinity: "soft"
  protocol: http
  service:
    type: ClusterIP
  # security off in dev/staging; flipped on with TLS + auth in prod
  esConfig:
    elasticsearch.yml: |
      xpack.security.enabled: false
      xpack.monitoring.collection.enabled: true
  # off by default; flip on when restoring a snapshot from S3 backup repo
  extraSnapshotPvc:
    enabled: false
    storageClassName: gp3
    size: 30Gi

kibana:
  enabled: true
  # kibana points at the same ES service the elastic subchart deploys.
  # prod exposes it via the Tailscale operator LB; ingress stays off here.
  elasticsearchHosts: "http://elasticsearch-master:9200"
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  service:
    type: ClusterIP
    port: 5601
  ingress:
    enabled: false
    className: ""
    hosts: []
    tls: []
  kibanaConfig:
    kibana.yml: |
      server.publicBaseUrl: "https://kibana.tailnet.example.ts.net"
      telemetry.enabled: false

fluent-bit:
  enabled: true
  # daemonset tails /var/log/containers + systemd and ships to
  # elasticsearch-master in this same namespace. (the F in EFK.)
  kind: DaemonSet
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      cpu: 200m
      memory: 256Mi
  tolerations:
    - operator: Exists
      effect: NoSchedule
    - operator: Exists
      effect: NoExecute
  config:
    service: |
      [SERVICE]
          Daemon Off
          Flush 1
          Log_Level info
          Parsers_File parsers.conf
          HTTP_Server On
          HTTP_Listen 0.0.0.0
          HTTP_Port 2020
          Health_Check On
    inputs: |
      [INPUT]
          Name tail
          Path /var/log/containers/*.log
          multiline.parser docker, cri
          Tag kube.*
          Mem_Buf_Limit 50MB
          Skip_Long_Lines On
      [INPUT]
          Name systemd
          Tag host.*
          Systemd_Filter _SYSTEMD_UNIT=kubelet.service
          Read_From_Tail On
    filters: |
      [FILTER]
          Name kubernetes
          Match kube.*
          Merge_Log On
          Keep_Log Off
          K8S-Logging.Parser On
          K8S-Logging.Exclude On
    outputs: |
      [OUTPUT]
          Name es
          Match kube.*
          Host elasticsearch-master
          Port 9200
          Logstash_Format On
          Logstash_Prefix mcp-logs
          Retry_Limit 5
          Suppress_Type_Name On
      [OUTPUT]
          Name es
          Match host.*
          Host elasticsearch-master
          Port 9200
          Logstash_Format On
          Logstash_Prefix host-logs
          Retry_Limit 5
          Suppress_Type_Name On

opentelemetry-collector:
  enabled: true
  # OTLP gateway. Receives grpc+http from app pods, fans out to jaeger
  # (traces) and prom (metrics). Pipeline config in templates/
  # otel-collector-config.yaml.
  mode: deployment
  image:
    repository: otel/opentelemetry-collector-contrib
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 400Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
  service:
    enabled: true
    type: ClusterIP
  presets:
    kubernetesAttributes:
      enabled: true

jaeger:
  enabled: true
  # production layout: agent daemonset, collector deployment, query
  # deployment, backed by the elasticsearch this same chart deploys.
  # all-in-one would also work in dev.
  provisionDataStore:
    cassandra: false
    elasticsearch: false
  storage:
    type: elasticsearch
    elasticsearch:
      host: elasticsearch-master
      port: 9200
      scheme: http
  agent:
    enabled: true
  collector:
    enabled: true
    replicaCount: 2
    service:
      otlp:
        grpc:
          name: otlp-grpc
          port: 4317
        http:
          name: otlp-http
          port: 4318
  query:
    enabled: true
    replicaCount: 1
    service:
      type: ClusterIP
  ingester:
    enabled: false
  esIndexCleaner:
    enabled: true
    schedule: "55 23 * * *"
    numberOfDays: 14

# dashboard + alertmanager configmaps always render; they're inert
# until kube-prometheus-stack brings up grafana + alertmanager.
dashboards:
  enabled: true

alertmanager:
  routes:
    pagerdutyServiceKey: ""
    slackWebhookUrl: ""
