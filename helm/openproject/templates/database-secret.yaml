{{- if .Values.externalSecrets.enabled }}
---
# DB password + DATABASE_URL come from AWS Secrets Manager via ESO.
# ClusterSecretStore lives in helm/addons/ and must be installed first.
# Install order is in README.md.
#
# The opf/openproject subchart consumes the kube Secret created here via
# externalDatabase.existingSecret + existingSecretPasswordKey. The
# DATABASE_URL key is also rendered for the seed Job (rails honors
# DATABASE_URL over the discrete env vars).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openproject-db
  labels:
    {{- include "openproject.labels" . | nindent 4 }}
  annotations:
    # bootstrap Job's main container has a secretKeyRef on this Secret.
    # kubelet won't start the container until the Secret exists, so we
    # land the ExternalSecret as a pre-install hook (same as the rds-master
    # one below). Init container polls for both.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: openproject-db
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # username is consumed by templates/db-bootstrap-job.yaml so
        # the Job and the rails pod see exactly the same OP role name.
        username: {{ .Values.openproject.postgresql.auth.username | quote }}
        password: "{{ `{{ .password }}` }}"
        DATABASE_URL: "postgres://{{ .Values.rds.username }}:{{ `{{ .password }}` }}@{{ .Values.rds.endpoint }}:{{ .Values.rds.port }}/{{ .Values.rds.database }}?sslmode=require"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.dbPasswordSecretId | quote }}
---
# Rails needs SECRET_KEY_BASE stable across pod restarts or session
# cookies invalidate. Stored separately so it rotates on a different
# cadence than the DB password.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openproject-rails
  labels:
    {{- include "openproject.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: openproject-rails
    creationPolicy: Owner
  data:
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: {{ .Values.externalSecrets.secretKeyBaseSecretId | quote }}
    - secretKey: OPENPROJECT_SEED_ADMIN_USER_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.adminPasswordSecretId | quote }}
---
# RDS master credentials. db-bootstrap Job logs in as this user to
# CREATE USER / CREATE DATABASE for the OpenProject role.
#
# Remote secret in AWS Secrets Manager is a JSON blob with `username` +
# `password`. dataFrom.extract turns each JSON key into a key on the kube
# Secret. Path is configurable so prod can point at
# openproject-mcp-prod/rds/master without code edits.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openproject-rds-master
  labels:
    {{- include "openproject.labels" . | nindent 4 }}
  annotations:
    # pre-install so the bootstrap Job sees the kube Secret. weight -20
    # places this BEFORE the db-bootstrap Job (weight -10). Init container
    # polls for ESO sync (CR existing doesn't mean it's reconciled yet).
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: openproject-rds-master
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.rds.masterSecretId | quote }}
{{- end }}
