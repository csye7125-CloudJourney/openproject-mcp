{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "openproject-mcp.fullname" . }}-secrets
  labels:
    {{- include "openproject-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "openproject-mcp.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENPROJECT_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.openprojectApiKeySecretId | quote }}
    - secretKey: WEBHOOK_HMAC_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.webhookHmacSecretId | quote }}
{{- end }}
