{{- if and .Values.imagePullSecret.enabled .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.imagePullSecret.secretName }}
  labels:
    {{- include "openproject-mcp.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.imagePullSecret.secretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ `{{ .username }}` }}","password":"{{ `{{ .token }}` }}","auth":"{{ `{{ printf "%s:%s" .username .token | b64enc }}` }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.imagePullSecret.awsSecretId | quote }}
        property: username
    - secretKey: token
      remoteRef:
        key: {{ .Values.imagePullSecret.awsSecretId | quote }}
        property: token
{{- end }}
