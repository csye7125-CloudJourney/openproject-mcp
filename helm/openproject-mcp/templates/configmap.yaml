apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openproject-mcp.fullname" . }}-env
  labels:
    {{- include "openproject-mcp.labels" . | nindent 4 }}
data:
  OPENPROJECT_BASE_URL: {{ .Values.openproject.baseUrl | quote }}
  MCP_TRANSPORT: {{ .Values.config.mcpTransport | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  KAFKA_BOOTSTRAP: {{ .Values.config.kafkaBootstrap | quote }}
  KAFKA_SECURITY_PROTOCOL: {{ .Values.config.kafkaSecurityProtocol | quote }}
  KAFKA_SASL_MECHANISM: {{ .Values.config.kafkaSaslMechanism | quote }}
  ENVIRONMENT: {{ .Values.environment | quote }}
