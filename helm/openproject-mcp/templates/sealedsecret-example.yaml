{{- if .Values.sealedSecret.enabled }}
# Example SealedSecret. Encrypted ciphertext below is a placeholder - regen via:
#
#   kubectl create secret generic openproject-mcp-fallback \
#     --from-literal=OPENPROJECT_API_KEY="<key>" \
#     --from-literal=WEBHOOK_HMAC_SECRET="<secret>" \
#     --namespace={{ .Release.Namespace }} --dry-run=client -o yaml \
#     | kubeseal --controller-namespace=sealed-secrets \
#                --controller-name=sealed-secrets \
#                --format yaml \
#       > sealed-fallback.yaml
#
# Then copy the spec.encryptedData blob below.
#
# This path is the break-glass fallback when External Secrets Operator + AWS
# Secrets Manager are unavailable (network partition, IRSA misconfig, etc.).
# Normally prefer ExternalSecret - see templates/externalsecret.yaml.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "openproject-mcp.fullname" . }}-fallback
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openproject-mcp.labels" . | nindent 4 }}
spec:
  encryptedData:
    OPENPROJECT_API_KEY: {{ .Values.sealedSecret.encryptedData.openprojectApiKey | quote }}
    WEBHOOK_HMAC_SECRET: {{ .Values.sealedSecret.encryptedData.webhookHmacSecret | quote }}
  template:
    metadata:
      name: {{ include "openproject-mcp.fullname" . }}-fallback
      namespace: {{ .Release.Namespace }}
      labels:
        {{- include "openproject-mcp.labels" . | nindent 8 }}
    type: Opaque
{{- end }}
