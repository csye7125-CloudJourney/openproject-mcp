apiVersion: v1
kind: Service
metadata:
  name: {{ include "openproject-mcp.fullname" . }}
  labels:
    {{- include "openproject-mcp.labels" . | nindent 4 }}
  {{- if .Values.service.tailscale.enabled }}
  annotations:
    # tailscale-operator joins the svc to the tailnet at:
    # mcp-{{ .Values.environment }}.<tailnet-name>.ts.net
    tailscale.com/expose: "true"
    tailscale.com/hostname: "mcp-{{ .Values.environment }}"
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openproject-mcp.selectorLabels" . | nindent 4 }}
