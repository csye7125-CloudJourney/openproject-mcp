{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openproject-mcp.serviceAccountName" . }}
  labels:
    {{- include "openproject-mcp.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.roleArn }}
  annotations:
    # IRSA - terraform/modules/iam outputs irsa_role_arns["mcp_server"].
    # Wire that into values via --set serviceAccount.roleArn=<arn> or env values file.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
  {{- end }}
automountServiceAccountToken: true
{{- if .Values.imagePullSecret.enabled }}
imagePullSecrets:
  - name: {{ .Values.imagePullSecret.secretName }}
{{- end }}
{{- end }}
