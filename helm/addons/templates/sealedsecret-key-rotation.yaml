{{- if and .Values.sealedSecrets.enabled .Values.sealedSecrets.keyRotation.enabled }}
# Quarterly sealed-secrets key rotation cronjob. The controller auto-renews
# on its own timer (values.sealed-secrets.keyrenewperiod = 2160h), this
# layer adds an event trail plus a manual kick if we suspect key compromise.
#
# On restart the controller mints a new active key when the renew window
# has elapsed. Old keys remain as decryption-only material so previously
# sealed payloads still apply.
#
# 90d cadence to match KMS. Schedule 0 3 1 */3 * fires at 03:00 UTC on
# the 1st of Jan/Apr/Jul/Oct.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sealed-secrets-key-rotation
  namespace: sealed-secrets
  labels:
    app.kubernetes.io/name: sealed-secrets-key-rotation
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sealed-secrets-key-rotation
  namespace: sealed-secrets
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sealed-secrets-key-rotation
  namespace: sealed-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sealed-secrets-key-rotation
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-key-rotation
    namespace: sealed-secrets
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: sealed-secrets-key-rotation
  namespace: sealed-secrets
  labels:
    app.kubernetes.io/name: sealed-secrets-key-rotation
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  schedule: {{ .Values.sealedSecrets.keyRotation.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: sealed-secrets-key-rotation
          restartPolicy: OnFailure
          containers:
            - name: kickoff
              image: bitnami/kubectl:1.30
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  echo "rotating sealed-secrets key at $(date -Iseconds)"
                  kubectl -n sealed-secrets rollout restart deployment/sealed-secrets
                  kubectl -n sealed-secrets rollout status deployment/sealed-secrets --timeout=180s
                  kubectl -n sealed-secrets create event sealed-secrets-key-rotation \
                    --type Normal \
                    --reason KeyRotated \
                    --message "rotated active key via cronjob" || true
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
{{- end }}
