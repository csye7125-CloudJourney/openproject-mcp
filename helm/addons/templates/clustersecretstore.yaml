{{- if .Values.externalSecrets.enabled }}
# Cluster-wide store for every ExternalSecret. Auth via IRSA on the
# external-secrets controller SA. Role arn comes from terraform
# (module.iam.irsa_role_arns["external_secrets"]).
#
# openproject-mcp/templates/externalsecret.yaml references this by
# name=aws-secrets-manager / kind=ClusterSecretStore. Keep that in sync
# with values.externalSecrets.secretStoreName on the consuming chart.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.region | quote }}
      # jwt = IRSA path. role arn lives on the SA annotation.
      # controller SA is in the external-secrets ns.
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
{{- end }}
