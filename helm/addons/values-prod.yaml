# Prod env overrides for addons.
# IRSA role arns wired in by Jenkins from `terraform output` against the
# prod env state.

region: us-east-1
hostedZone: t3ja.com

externalSecrets:
  enabled: true
  serviceAccount:
    roleArn: ""

external-secrets:
  replicaCount: 3
  webhook:
    replicaCount: 3
  certController:
    replicaCount: 2
  # PDB ensures upgrades don't take all the controllers down at once.
  # Upstream chart exposes podDisruptionBudget under each component.
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

sealedSecrets:
  enabled: true
  keyRotation:
    enabled: true
    schedule: "0 3 1 */3 *"

sealed-secrets:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

externalDns:
  enabled: true
  serviceAccount:
    roleArn: ""

external-dns:
  domainFilters:
    - t3ja.com
  txtOwnerId: openproject-mcp-prod
  policy: sync
  # tighter sync interval in prod so DNS catches up on rapid deploys
  interval: 30s
  logLevel: info
