services:
  dind:
    image: docker:25.0-dind
    container_name: openproject-mcp-dind
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock"]
    volumes:
      - jenkins_docker_certs:/certs/client
      - jenkins_home:/var/jenkins_home
    networks:
      - jenkins

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: openproject-mcp-jenkins:local
    container_name: openproject-mcp-jenkins
    restart: unless-stopped
    depends_on:
      - dind
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JENKINS_ADMIN_ID: ${JENKINS_ADMIN_ID}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD}
      # talk to the dind sidecar instead of the host socket
      DOCKER_HOST: tcp://dind:2375
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - jenkins
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  jenkins_home:
  jenkins_docker_certs:

networks:
  jenkins:
